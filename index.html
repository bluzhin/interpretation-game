<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игра в интерпретацию</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d2129; --line:#2a2f3a;
    --text:#e8eaf0; --muted:#9aa3b2; --accent:#6c8cff; --accent2:#36c2a8;
    --root:#ffb84d; --chip:#262b36; --danger:#ff6b6b; --shadow:0 6px 22px rgba(0,0,0,.35);
    --radius:14px; --bgGrad:radial-gradient(1200px 600px at 70% -10%,#1a2030,#0f1115 60%);
    --headBg:rgba(20,23,30,.7); --selected:#23304f;
  }
  body.light{
    --bg:#f4f6fb; --panel:#ffffff; --panel2:#f7f9fc; --line:#dfe4ee;
    --text:#1b2030; --muted:#697086; --accent:#3b5bdb; --accent2:#0ca678;
    --root:#e8950c; --chip:#eef1f7; --danger:#e03131; --shadow:0 6px 22px rgba(30,40,70,.12);
    --bgGrad:radial-gradient(1200px 600px at 70% -10%,#eaf0ff,#f4f6fb 60%);
    --headBg:rgba(255,255,255,.8); --selected:#dbe6ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
    background:var(--bgGrad);
    color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;
  }
  header{
    display:flex;align-items:center;gap:12px;padding:12px 18px;
    border-bottom:1px solid var(--line);background:var(--headBg);backdrop-filter:blur(8px);
    flex-wrap:wrap;
  }
  header h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px;white-space:nowrap}
  header .sub{color:var(--muted);font-size:12px}
  .spacer{flex:1}
  .pill{
    display:inline-flex;align-items:center;gap:6px;background:var(--chip);
    border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;color:var(--text);
  }
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .pill.cloud .dot{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
  .pill.local .dot{background:var(--root)}
  button{font-family:inherit}
  .btn{
    border:1px solid var(--line);background:var(--panel2);color:var(--text);
    padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;transition:.15s;
  }
  .btn:hover{border-color:var(--accent);background:#222838}
  .btn.primary{background:linear-gradient(180deg,#7b97ff,#5d7bff);border-color:#5d7bff;color:#fff;font-weight:600}
  .btn.primary:hover{filter:brightness(1.07)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .btn.icon{padding:8px 11px}

  /* Карусель авторов (горизонтальная, крупные карточки 2–3 на экран) */
  .authors-bar{display:flex;gap:16px;align-items:stretch;padding:16px 18px;overflow-x:auto;
    border-bottom:1px solid var(--line);background:var(--headBg)}
  .authors-bar.full{flex:1;min-height:0}
  .authors-bar.hidden{display:none}
  .auth-chip{width:clamp(360px,31vw,560px);flex:0 0 auto;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:16px 18px;cursor:pointer;transition:.12s;position:relative;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .auth-chip:hover{border-color:var(--accent);transform:translateY(-2px)}
  .auth-chip .nm{font-weight:700;font-size:17px;margin-bottom:3px;padding-right:16px}
  .auth-chip .st{font-size:12px;color:var(--muted);margin-bottom:10px}
  .auth-chip .st.playing{color:var(--accent2)}
  .auth-chip .tx{flex:1;min-height:80px;font-size:14px;line-height:1.6;color:var(--text);
    overflow-y:auto;white-space:pre-wrap;word-break:break-word;border-top:1px solid var(--line);padding-top:10px}
  .auth-chip .del{position:absolute;top:10px;right:11px;font-size:13px;z-index:2}
  .auth-add{min-width:150px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    border:1px dashed var(--line);border-radius:12px;background:transparent;color:var(--muted);cursor:pointer;font-size:13px}
  .auth-add:hover{border-color:var(--accent);color:var(--accent)}
  .selbar{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--headBg)}
  .selbar.hidden{display:none}
  .selbar .who{font-weight:650;font-size:14px}
  .selbar .who small{color:var(--muted);font-weight:400;margin-left:6px}

  /* Board */
  .board{
    flex:1;display:flex;gap:16px;padding:18px;overflow-x:auto;overflow-y:hidden;align-items:flex-start;
  }
  .col{
    width:330px;min-width:330px;max-height:100%;display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  }
  .col.roots{border-color:#3a3320}
  .col-head{
    padding:14px 14px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;
  }
  .col-head .title{font-weight:650;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .col-head .meta{color:var(--muted);font-size:12px;margin-top:4px}
  .pair{display:inline-flex;align-items:center;gap:6px}
  .name-chip{background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:2px 9px;font-size:12px}
  .arrow{color:var(--muted)}
  .col-body{padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
  .col-foot{padding:10px 12px;border-top:1px solid var(--line)}

  .card{
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;
    position:relative;animation:pop .18s ease;
  }
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card.root{border-left:3px solid var(--root)}
  .author-card{cursor:pointer;transition:.12s}
  .author-card:hover{border-color:var(--accent)}
  .author-card.sel{border-color:var(--accent);background:var(--selected)}
  .author-card .ttl{font-weight:650;font-size:14px}
  .card .ctop{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
  .round-badge{
    font-size:11px;font-weight:700;color:#0f1115;background:var(--accent);border-radius:6px;padding:2px 7px;
  }
  .round-badge.odd{background:var(--accent2)}
  .card .author{font-size:12px;color:var(--muted)}
  .card .author b{color:var(--text)}
  .card .text{font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .card .text.preview{max-height:230px;overflow-y:auto;padding-right:4px}
  .card .text.clamped{max-height:160px;overflow:hidden;-webkit-mask-image:linear-gradient(#000 70%,transparent)}
  .card .expand{font-size:12px;color:var(--accent);cursor:pointer;margin-top:6px;display:inline-block}
  .card .ttl{font-weight:650;font-size:14px;margin-bottom:6px}
  .card .del{position:absolute;top:8px;right:8px;color:var(--muted);background:none;border:none;cursor:pointer;font-size:14px;opacity:.5}
  .card .del:hover{opacity:1;color:var(--danger)}

  .empty{color:var(--muted);font-size:13px;text-align:center;padding:24px 8px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(6,8,12,.6);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    width:min(560px,100%);max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
  .modal h2{margin:0;padding:18px 20px;font-size:16px;border-bottom:1px solid var(--line)}
  .modal .content{padding:20px}
  .field{margin-bottom:14px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  input,textarea{
    width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;resize:vertical;
  }
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:130px}
  .modal .actions{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--line)}
  .hint{font-size:12px;color:var(--muted);line-height:1.5}
  .hint code{background:var(--chip);padding:1px 5px;border-radius:5px}
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab{padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);cursor:pointer;font-size:13px}
  .tab.active{border-color:var(--accent);color:var(--accent)}
  details{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px}
  summary{cursor:pointer;font-size:13px}
  .ol{font-size:13px;line-height:1.6;color:var(--muted);padding-left:18px}
  .ol code{background:var(--chip);padding:1px 5px;border-radius:5px;color:var(--text)}
  ::-webkit-scrollbar{height:10px;width:10px}
  ::-webkit-scrollbar-thumb{background:#2a2f3a;border-radius:10px}

  /* История переписки в окне ответа */
  .thread{max-height:300px;overflow:auto;border:1px solid var(--line);border-radius:10px;
    padding:10px;background:#12151c;display:flex;flex-direction:column;gap:10px}
  .thread-item{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .thread-item.root{border-left:3px solid var(--root)}
  .th-meta{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .th-tag{font-size:10px;font-weight:700;color:#0f1115;background:var(--accent);border-radius:5px;padding:2px 6px}
  .th-tag.odd{background:var(--accent2)}
  .th-tag.root{background:var(--root)}
  .th-text{font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .thread.big{max-height:none;border:none;padding:0;background:transparent;gap:16px}
  .thread.big .thread-item{padding:14px 16px}
  .thread.big .th-text{font-size:15px;line-height:1.7}
  .thread.big .th-meta{font-size:12px;margin-bottom:8px}

  /* мини-кнопки на карточках */
  .card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .chip-btn{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel);color:var(--text);cursor:pointer;text-decoration:none;display:inline-flex;gap:5px;align-items:center}
  .chip-btn:hover{border-color:var(--accent)}
  .chip-btn.read{border-color:var(--accent);color:var(--accent)}
  .file-tag{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:6px}
  .file-tag .ext{background:var(--chip);border:1px solid var(--line);border-radius:5px;padding:1px 6px;text-transform:uppercase;font-weight:700;font-size:10px}

  /* витрина — большое окно чтения */
  .reader{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    width:min(860px,100%);max-height:92vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .reader-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
  .reader-head .ti{flex:1}
  .reader-head h2{margin:0;font-size:17px}
  .reader-head .who{color:var(--muted);font-size:13px;margin-top:4px}
  .reader-body{padding:22px 26px;overflow:auto;line-height:1.7;font-size:15px;white-space:pre-wrap;word-break:break-word}
  .reader-body.empty{color:var(--muted);font-style:italic}
  .reader-body.pdf{padding:0;overflow:hidden}
  .reader-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
  .reader embed,.reader iframe{width:100%;height:70vh;border:none;border-radius:10px;background:#fff}
  .reader.full{width:100vw;height:100vh;max-height:100vh;border-radius:0}
  .reader.full .reader-body{flex:1}
  .reader.full embed,.reader.full iframe{height:calc(100vh - 140px)}
  .reader-head .tools{display:flex;gap:6px;align-items:center}
  .x-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
  .x-close:hover{color:var(--text)}

  /* ---------- Мобильная вёрстка ---------- */
  @media (max-width:640px){
    header{padding:9px 12px;gap:8px}
    header h1{font-size:15px}
    header .sub{display:none}
    .btn.sm{padding:7px 11px;font-size:12px}
    #newRootBtn{order:5}
    .pill{padding:6px 10px;font-size:12px}

    .authors-bar{padding:12px;gap:12px}
    .auth-chip{width:86vw;box-shadow:none}
    .auth-chip .nm{font-size:16px}
    .auth-chip .tx{font-size:14px}

    .selbar{padding:9px 12px}
    .board{padding:12px;gap:12px;scroll-snap-type:x mandatory}
    .col{width:88vw;min-width:88vw;scroll-snap-align:start}

    .overlay{padding:0;align-items:flex-end}
    .modal{width:100%;max-height:92vh;border-radius:16px 16px 0 0}
    .modal .content{padding:16px}
    .modal h2{padding:15px 16px;font-size:15px}
    .reader{width:100%;max-height:94vh;border-radius:16px 16px 0 0}
    .reader-head{padding:14px 16px}
    .reader-head h2{font-size:15px}
    .reader-body{padding:16px 16px}
    .reader embed,.reader iframe{height:62vh}
    .thread{max-height:none}
    .reader-foot{justify-content:stretch}
    .reader-foot .btn{flex:1;text-align:center}
  }
</style>
</head>
<body>

<header>
  <h1>🎭 Игра в интерпретацию</h1>
  <span class="sub" id="roomLabel"></span>
  <div class="spacer"></div>
  <span class="pill" id="mePill" title="Я"><span>👤</span><span id="meText">—</span></span>
  <button class="btn sm" id="newRootBtn">＋ Исходный текст</button>
  <button class="btn icon" id="themeBtn" title="Тема">🌓</button>
  <button class="btn icon" id="settingsBtn" title="Настройки">⚙️</button>
</header>

<div id="authorsBar" class="authors-bar"></div>
<div class="board" id="board"></div>

<!-- импорт готовых веток (реальные тексты); файл может отсутствовать -->
<script src="seed.js" onerror="window.SEED=window.SEED||null"></script>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script type="module">
/* ============================================================
   Игра в интерпретацию — один файл, два режима хранения:
   • Локальный (localStorage) — для теста, работает сразу
   • Облачный (Firebase Firestore) — общий доступ в реальном времени
   ============================================================ */

const LS = {
  me: 'ig_me',
  fb: 'ig_fb_config',
  room: 'ig_room',
  theme: 'ig_theme',
  // версия в ключе: при обновлении исходных данных (seed) переимпорт произойдёт автоматически
  local: (room) => 'ig_data_v2_' + room,
};

let state = {
  me: localStorage.getItem(LS.me) || '',
  room: localStorage.getItem(LS.room) || 'общая-комната',
  mode: 'local',     // 'local' | 'cloud'
  posts: [],         // {id,type,...}
  expanded: new Set(),
  user: null,        // объект пользователя Google (в облачном режиме)
  selected: null,    // выбранный автор (rootId)
};

/* ---------- Слой данных (абстракция над local/cloud) ---------- */
let dataLayer = null;

function makeLocalLayer(room){
  const key = LS.local(room);
  function read(){
    let raw = localStorage.getItem(key);
    if(raw===null && Array.isArray(window.SEED)){
      // первый запуск — импортируем готовые ветки (реальные тексты)
      write(window.SEED);
      raw = localStorage.getItem(key);
    }
    try{return JSON.parse(raw)||[]}catch(e){return []}
  }
  function write(arr){ localStorage.setItem(key, JSON.stringify(arr)); }
  return {
    mode:'local',
    subscribe(cb){
      cb(read());
      const h = (e)=>{ if(e.key===key) cb(read()); };
      window.addEventListener('storage', h);
      this._h = h;
      // также локальный bus для той же вкладки
      this._bus = ()=>cb(read());
    },
    async add(post){
      const arr = read();
      post.id = post.id || ('p_'+Date.now()+'_'+Math.random().toString(36).slice(2,7));
      post.createdAt = post.createdAt || Date.now();
      arr.push(post); write(arr); if(this._bus) this._bus();
    },
    async remove(id){
      const arr = read().filter(p=>p.id!==id && p.rootId!==id);
      write(arr); if(this._bus) this._bus();
    },
    exportAll(){ return read(); },
    async importAll(arr){ write(arr); if(this._bus) this._bus(); },
  };
}

async function makeCloudLayer(room, cfg){
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, getDocs, query, writeBatch }
    = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
  const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
  const app = initializeApp(cfg, 'ig-'+Math.random().toString(36).slice(2,6));
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const colRef = collection(db, 'ig_rooms', room, 'posts');
  return {
    mode:'cloud',
    // --- авторизация Google ---
    auth: {
      onChange(cb){ onAuthStateChanged(auth, cb); },
      async signIn(){
        try{ await signInWithPopup(auth, provider); }
        catch(e){
          if(e.code==='auth/operation-not-supported-in-this-environment' || e.code==='auth/popup-blocked'){
            alert('Вход Google не работает при открытии файла напрямую (file://) или при блокировке всплывающих окон.\n\nОткройте страницу по адресу http(s) — через Firebase Hosting, GitHub Pages или локальный сервер.');
          } else if(e.code==='auth/unauthorized-domain'){
            alert('Домен не разрешён. В Firebase → Authentication → Settings → Authorized domains добавьте домен, с которого открыта страница.');
          } else { alert('Ошибка входа: '+e.message); }
        }
      },
      async signOut(){ await signOut(auth); },
      current(){ return auth.currentUser; },
    },
    subscribe(cb){
      this._unsub = onSnapshot(colRef, (snap)=>{
        const arr = []; snap.forEach(d=>arr.push({ ...d.data(), id:d.id }));
        cb(arr);
      }, (err)=>{ console.error(err); alert('Ошибка облака: '+err.message); });
    },
    async add(post){
      post.createdAt = post.createdAt || Date.now();
      await addDoc(colRef, post);
    },
    async remove(id){
      // удаляем сам пост и (если корень) его ответы
      const snap = await getDocs(colRef);
      const batch = writeBatch(db);
      snap.forEach(d=>{ const v=d.data(); if(d.id===id || v.rootId===id) batch.delete(doc(colRef,d.id)); });
      await batch.commit();
    },
    async exportAll(){ const snap=await getDocs(colRef); const a=[]; snap.forEach(d=>a.push({...d.data(),id:d.id})); return a; },
    async importAll(arr){ for(const p of arr){ const {id,...rest}=p; await addDoc(colRef, rest); } },
  };
}

/* ---------- Инициализация слоя ---------- */
async function initLayer(){
  const cfgRaw = localStorage.getItem(LS.fb);
  if(cfgRaw){
    try{
      const cfg = JSON.parse(cfgRaw);
      dataLayer = await makeCloudLayer(state.room, cfg);
      state.mode = 'cloud';
    }catch(e){
      console.error('Firebase config error', e);
      alert('Не удалось подключить облако, работаю локально. ('+e.message+')');
      dataLayer = makeLocalLayer(state.room);
      state.mode = 'local';
    }
  } else {
    dataLayer = makeLocalLayer(state.room);
    state.mode = 'local';
  }
  dataLayer.subscribe((posts)=>{ state.posts = posts; render(); });
  // авторизация Google (только облачный режим)
  if(dataLayer.auth){
    dataLayer.auth.onChange((user)=>{
      state.user = user;
      if(user){ state.me = user.displayName || user.email; }
      renderChrome();
    });
  }
  renderChrome();
}

/* ---------- Модель: колонки-цепочки ---------- */
// root: {type:'root', author, title, text}
// reply:{type:'reply', rootId, responder, round, author, text}
// Колонка = rootId + responder. Круг 1 пишет responder, круг 2 — автор корня, и т.д.

function roots(){ return state.posts.filter(p=>p.type==='root').sort((a,b)=>a.createdAt-b.createdAt); }
function repliesOf(rootId){ return state.posts.filter(p=>p.type==='reply'&&p.rootId===rootId); }

function chainsForRoot(rootId){
  const map = new Map(); // responder -> replies[]
  for(const r of repliesOf(rootId)){
    if(!map.has(r.responder)) map.set(r.responder, []);
    map.get(r.responder).push(r);
  }
  const out = [];
  for(const [responder, arr] of map){
    arr.sort((a,b)=>a.round-b.round);
    out.push({responder, replies:arr});
  }
  out.sort((a,b)=> (a.replies[0]?.createdAt||0)-(b.replies[0]?.createdAt||0));
  return out;
}

/* ---------- Рендер ---------- */
const board = document.getElementById('board');

function render(){
  const root = state.selected ? roots().find(r=>r.id===state.selected) : null;
  renderAuthorsBar(root);
  board.innerHTML = '';
  // выбранный автор: исходный текст первой карточкой + ветки игроков
  if(root){
    board.style.display = 'flex';
    board.appendChild(initialColumn(root));
    for(const chain of chainsForRoot(root.id)){
      board.appendChild(chainColumn(root, chain));
    }
  } else {
    // ничего не выбрано — карусель авторов заполняет экран, доска скрыта
    board.style.display = 'none';
  }
}

// Горизонтальная карусель авторов сверху; после выбора — сворачивается в строку
function renderAuthorsBar(root){
  const bar = document.getElementById('authorsBar');
  let sel = document.getElementById('selBar');
  if(!sel){
    sel = el('div','selbar'); sel.id='selBar';
    bar.parentNode.insertBefore(sel, bar.nextSibling);
  }
  if(root){
    bar.classList.add('hidden');
    sel.classList.remove('hidden');
    sel.innerHTML = '';
    const back = el('button','btn sm'); back.textContent='← Сменить автора';
    back.onclick = ()=>{ state.selected=null; render(); };
    const who = el('div','who'); who.innerHTML = `${esc(root.author)} <small>исходный текст</small>`;
    sel.appendChild(back); sel.appendChild(who);
    return;
  }
  sel.classList.add('hidden');
  bar.classList.remove('hidden');
  bar.classList.add('full');
  bar.innerHTML = '';
  const rs = roots();
  if(!rs.length){ bar.appendChild(elText('empty','Пока пусто. Нажмите «＋ Исходный текст».')); }
  for(const r of rs){
    const n = chainsForRoot(r.id).length;
    const chip = el('div','auth-chip');
    chip.innerHTML = `<button class="del" title="Удалить">✕</button>
      <div class="nm"></div>
      <div class="st ${n?'playing':''}">${ n ? '🎮 играют: '+n : 'ходов ещё нет'}</div>
      <div class="tx"></div>`;
    chip.querySelector('.nm').textContent = r.author;
    chip.querySelector('.tx').textContent = preview(r.text, r);
    chip.querySelector('.del').onclick = (e)=>{ e.stopPropagation();
      if(confirm('Удалить исходный текст «'+r.author+'» и все его ветки?')) dataLayer.remove(r.id); };
    chip.onclick = ()=>{ state.selected = r.id; render(); };
    bar.appendChild(chip);
  }
  const add = el('button','auth-add'); add.textContent='＋ Исходный текст';
  add.onclick = openRootModal; bar.appendChild(add);
}

// Колонка выбранного автора: исходный текст первой карточкой + «первый ход»

function chainColumn(root, chain){
  const col = el('div','col');
  const head = el('div','col-head');
  head.innerHTML = `<div class="title"><span class="pair">
      <span class="name-chip">${esc(root.author)}</span>
      <span class="arrow">⇄</span>
      <span class="name-chip">${esc(chain.responder)}</span></span></div>
    <div class="meta">по тексту: «${esc(root.title||'без названия')}» · кругов: ${chain.replies.length}</div>`;
  col.appendChild(head);
  const body = el('div','col-body');
  for(const rep of chain.replies){
    const card = el('div','card');
    const odd = rep.round % 2 === 1;
    card.innerHTML = `<button class="del" title="Удалить">✕</button>
      <div class="ctop"><span class="round-badge ${odd?'odd':''}">КРУГ ${rep.round}</span>
      <span class="author">от <b>${esc(rep.author)}</b> → ${esc(rep.toName)}</span></div>
      <div class="text preview"></div>`;
    card.querySelector('.text').textContent = preview(rep.text, rep);
    card.querySelector('.del').onclick = ()=>{ if(confirm('Удалить этот ответ (круг '+rep.round+')?')) dataLayer.remove(rep.id); };
    card.appendChild(fileTag(rep));
    card.appendChild(cardActions(rep, '📖 Читать'));
    body.appendChild(card);
  }
  col.appendChild(body);
  const foot = el('div','col-foot');
  const next = nextRoundInfo(root, chain);
  const readBtn = el('button','btn sm primary'); readBtn.style.width='100%';
  readBtn.textContent = '📖 Читать ветку';
  readBtn.onclick = ()=>openThreadReader(root, chain);
  const ansBtn = el('button','btn sm'); ansBtn.style.width='100%'; ansBtn.style.marginTop='8px';
  ansBtn.textContent = `＋ Ответить (круг ${next.round}, пишет ${next.author})`;
  ansBtn.onclick = ()=>openReplyModal(root, chain);
  foot.appendChild(readBtn); foot.appendChild(ansBtn);
  col.appendChild(foot);
  return col;
}

// Чтение всей ветки подряд: основной текст → круг 1 → круг 2 → …
function openThreadReader(root, chain){
  const blocks = [];
  blocks.push(blockHTML('ИСХОДНЫЙ', 'root', 'Автор: '+esc(root.author), root));
  for(const rep of chain.replies){
    const odd = rep.round%2===1;
    blocks.push(blockHTML('КРУГ '+rep.round, odd?'odd':'', esc(rep.author)+' → '+esc(rep.toName), rep));
  }
  modal.className = 'reader';
  modal.innerHTML = `
    <div class="reader-head">
      <div class="ti"><h2>Ветка: ${esc(root.author)} ⇄ ${esc(chain.responder)}</h2>
        <div class="who">основной текст → ходы по порядку (${chain.replies.length})</div></div>
      <div class="tools">
        <button class="x-close" id="fs" title="Развернуть на весь экран">⛶</button>
        <button class="x-close" id="xclose" title="Закрыть">✕</button>
      </div>
    </div>
    <div class="reader-body"><div class="thread big">${blocks.join('')}</div></div>
    <div class="reader-foot"></div>`;
  modal.querySelector('#fs').onclick = ()=>modal.classList.toggle('full');
  modal.querySelector('#xclose').onclick = closeReader;
  const foot = modal.querySelector('.reader-foot');
  const next = nextRoundInfo(root, chain);
  const ans = el('button','btn sm primary');
  ans.textContent = `＋ Ответить (круг ${next.round})`;
  ans.onclick = ()=>{ closeReader(); openReplyModal(root, chain); };
  const cl = el('button','btn sm ghost'); cl.textContent='Закрыть'; cl.onclick=closeReader;
  foot.appendChild(ans); foot.appendChild(cl);
  overlay.classList.add('show');
}
function blockHTML(tag, cls, who, item){
  const isPdf = (item.fileType||'').toLowerCase()==='pdf';
  let inner;
  if(isPdf && (item.fileUrl||item.fileData)){
    inner = `<div class="th-text"><a class="chip-btn" href="${item.fileUrl||item.fileData}" target="_blank">🔍 Открыть PDF</a></div>`;
  } else {
    const t = (item.text||'').trim();
    inner = `<div class="th-text">${ t ? esc(t) : (item.fileName ? '📎 '+esc(item.fileName)+' — скачайте оригинал' : '(пусто)') }</div>`;
  }
  return `<div class="thread-item ${cls==='root'?'root':''}">
    <div class="th-meta"><span class="th-tag ${cls}">${tag}</span> ${who}${item.fileName?(' · '+esc(item.fileName)):''}</div>
    ${inner}</div>`;
}

function nextRoundInfo(root, chain){
  const round = (chain && chain.replies.length) ? chain.replies[chain.replies.length-1].round + 1 : 1;
  // нечётный круг — пишет respondent, чётный — автор корня
  const author = round % 2 === 1 ? (chain ? chain.responder : '') : root.author;
  const toName = round % 2 === 1 ? root.author : (chain ? chain.responder : '');
  return {round, author, toName};
}

// текст для карточки/превью — извлечённый текст (в т.ч. для PDF); сам PDF остаётся в окне чтения
function preview(text, item){
  const t = (text||'').trim();
  if(t) return t;
  if(item && item.fileName) return '📎 '+item.fileName;
  return '(пусто)';
}

// плашка с типом файла
function fileTag(item){
  const wrap = el('div','');
  if(item && item.fileName){
    const t = el('div','file-tag');
    t.innerHTML = `<span class="ext">${esc(item.fileType||'файл')}</span><span>${esc(item.fileName)}</span>`;
    wrap.appendChild(t);
  }
  return wrap;
}

// кнопки «Читать» (витрина) + «Скачать» / «Открыть PDF»
function cardActions(item, readLabel){
  const box = el('div','card-actions');
  const read = el('button','chip-btn read'); read.textContent = readLabel || '📖 Читать';
  read.onclick = ()=>openReader(item);
  box.appendChild(read);
  if(item.fileUrl){
    const dl = document.createElement('a'); dl.className='chip-btn'; dl.href=item.fileUrl;
    dl.setAttribute('download', item.fileName||''); dl.textContent='⬇ Скачать';
    box.appendChild(dl);
    if((item.fileType||'').toLowerCase()==='pdf'){
      const op = document.createElement('a'); op.className='chip-btn'; op.href=item.fileUrl;
      op.target='_blank'; op.textContent='🔍 Открыть PDF'; box.appendChild(op);
    }
  } else if(item.fileData){ // загруженный файл (data URL)
    const dl = document.createElement('a'); dl.className='chip-btn'; dl.href=item.fileData;
    dl.setAttribute('download', item.fileName||'файл'); dl.textContent='⬇ Скачать';
    box.appendChild(dl);
  }
  return box;
}

// витрина — окно чтения
function openReader(item){
  const isRoot = item.type==='root';
  const who = isRoot ? ('Автор: '+esc(item.author)) :
    ('Круг '+item.round+' · от '+esc(item.author)+' → '+esc(item.toName));
  const title = isRoot ? esc(item.title||item.author) : ('Ответ — '+esc(item.toName));
  const pdfUrl = (item.fileType||'').toLowerCase()==='pdf' ? (item.fileUrl||item.fileData) : null;
  const text = item.text || '';
  // для PDF показываем сам документ (встроенный просмотр), а не извлечённый текст
  const bodyHtml = pdfUrl
    ? `<div class="reader-body pdf"><embed src="${pdfUrl}#view=FitH" type="application/pdf"></div>`
    : `<div class="reader-body ${text?'':'empty'}">${ text ? esc(text) : 'Текст недоступен для предпросмотра — скачайте оригинал.' }</div>`;
  modal.className = 'reader';
  modal.innerHTML = `
    <div class="reader-head">
      <div class="ti"><h2>${title}</h2><div class="who">${who}</div></div>
      <div class="tools">
        <button class="x-close" id="fs" title="Развернуть на весь экран">⛶</button>
        <button class="x-close" id="xclose" title="Закрыть">✕</button>
      </div>
    </div>
    ${bodyHtml}
    <div class="reader-foot"></div>`;
  modal.querySelector('#fs').onclick = ()=>modal.classList.toggle('full');
  modal.querySelector('#xclose').onclick = closeReader;
  const foot = modal.querySelector('.reader-foot');
  if(isRoot){
    const play = el('button','btn sm primary'); play.textContent='🎮 Начать игру — ответить автору';
    play.onclick = ()=>{ closeReader(); state.selected = item.id; render(); openReplyModal(item, null); };
    foot.appendChild(play);
  }
  if(pdfUrl){
    const op = document.createElement('a'); op.className='btn sm'; op.href=pdfUrl; op.target='_blank'; op.textContent='🔍 Открыть PDF в новой вкладке'; foot.appendChild(op);
  }
  const url = item.fileUrl || item.fileData;
  if(url){
    const dl = document.createElement('a'); dl.className='btn sm'; dl.href=url;
    dl.setAttribute('download', item.fileName||''); dl.textContent='⬇ Скачать оригинал';
    foot.appendChild(dl);
  }
  const cl = el('button','btn sm ghost'); cl.textContent='Закрыть'; cl.onclick=closeReader; foot.appendChild(cl);
  overlay.classList.add('show');
}
function closeReader(){ overlay.classList.remove('show'); modal.className='modal'; modal.innerHTML=''; }

/* ---------- Верхняя панель ---------- */
function renderChrome(){
  document.getElementById('roomLabel').textContent = '· комната: ' + state.room;
  const me = document.getElementById('meText');
  const pill = document.getElementById('mePill');
  if(state.mode === 'cloud'){
    if(state.user){ me.textContent = state.me; pill.title = 'Вы вошли как '+(state.user.email||''); }
    else { me.textContent = 'Войти через Google'; pill.title = 'Войти через Google'; }

    me.textContent = state.me || 'выбрать имя'; pill.title = 'Я';
  }
}

// Идентификация перед публикацией: облако → вход Google; локально → имя.
function requireIdentity(cb){
  if(state.mode === 'cloud' && dataLayer.auth){
    if(state.user){ cb(); }
    else { dataLayer.auth.signIn(); }   // после входа onChange обновит состояние; действие повторить
    return;
  }
  requireName(cb);
}

function openMeModal(after){

function historyHTML(root, chain){
  // исходный текст + все предыдущие круги — чтобы отвечать в контексте
  let h = `<div class="thread">
    <div class="thread-item root">
      <div class="th-meta"><span class="th-tag root">ИСХОДНЫЙ</span> ${esc(root.author)}${root.title?' · «'+esc(root.title)+'»':''}</div>
      <div class="th-text">${esc(root.text)}</div>
    </div>`;
  if(chain){
    for(const r of chain.replies){
      const odd = r.round%2===1;
      h += `<div class="thread-item">
        <div class="th-meta"><span class="th-tag ${odd?'odd':''}">КРУГ ${r.round}</span> ${esc(r.author)} → ${esc(r.toName)}</div>
        <div class="th-text">${esc(r.text)}</div>
      </div>`;
    }
  }
  h += `</div>`;
  return h;
}

function openReplyModal(root, chain){
  requireIdentity(()=>{
    const isNew = !chain;
    // респондент: для новой ветки — текущий пользователь; для существующей — закреплён
    let responder = chain ? chain.responder : state.me;
    const info = nextRoundInfo(root, chain || {responder, replies:[]});
    // в существующей ветке автор круга определяется автоматически и не меняется
    const lockedAuthor = info.author;
    modal.innerHTML = `<h2>💬 Ответ — круг ${info.round}</h2>
      <div class="content">
        <div class="hint" style="margin-bottom:10px">
          ${isNew
            ? 'Вы начинаете <b>новую ветку</b> от исходного текста (круг 1).'
            : `Ветка <b>${esc(root.author)} ⇄ ${esc(responder)}</b> — пишет <b>${esc(lockedAuthor)}</b>.`}
        </div>
        <label>Предыдущие тексты</label>
        ${historyHTML(root, chain)}
        ${isNew ? `<div class="field" style="margin-top:14px"><label>Кто отвечает (вы — респондент)</label>
          <input id="resp" value="${esc(responder)}"></div>` : ''}
        <div class="field" style="margin-top:14px"><label>Текст ответа (круг ${info.round}, автор ${esc(lockedAuthor)})</label>
          <textarea id="txt" placeholder="Ваша интерпретация / ответ…"></textarea></div>
        <div class="field"><label>…или загрузите файл (docx, pdf, doc, txt)</label>
          <input type="file" id="file" accept=".doc,.docx,.pdf,.txt"></div>
      </div>
      <div class="actions"><button class="btn ghost" id="cancel">Отмена</button>
      <button class="btn primary" id="save">Отправить</button></div>`;
    overlay.classList.add('show'); modal.querySelector('#txt').focus();
    modal.querySelector('#cancel').onclick = closeModal;
    modal.querySelector('#save').onclick = async ()=>{
      const text = modal.querySelector('#txt').value.trim();
      const up = await readUpload(modal.querySelector('#file'));
      if(!text && !up) return alert('Введите текст или загрузите файл.');
      const respVal = isNew ? (modal.querySelector('#resp').value.trim()||state.me) : responder;
      const round = isNew ? 1 : info.round;
      // автор круга всегда вычисляется автоматически: ветка остаётся между теми же двумя
      const authVal = round % 2 === 1 ? respVal : root.author;
      const toName  = round % 2 === 1 ? root.author : respVal;
      const post = {type:'reply', rootId:root.id, responder:respVal, round, author:authVal, toName,
        text: text || (up && up.text) || '', ...ownerFields()};
      if(up){ post.fileName=up.fileName; post.fileType=up.fileType; post.fileData=up.fileData; }
      dataLayer.add(post);
      closeModal();
    };
  });
}

            <li><b>Build → Authentication → Get started → Sign-in method → Google → Enable</b> (для входа через Google-почту).</li>
            <li><b>Project settings (⚙)</b> → <b>Your apps</b> → значок <b>&lt;/&gt;</b> (Web) → зарегистрируйте приложение.</li>
            <li>Скопируйте объект <code>firebaseConfig = {…}</code> и вставьте сюда только <b>{…}</b>.</li>
            <li>Откройте страницу по <b>http(s)</b> (Firebase Hosting / GitHub Pages / локальный сервер) — вход Google не работает из <code>file://</code>.</li>
            <li>В <b>Authentication → Settings → Authorized domains</b> добавьте домен, с которого открываете страницу.</li>
            <li>Раздайте участникам тот же конфиг и то же название комнаты.</li>
          </ol>
          <div class="hint" style="margin-top:8px">⚠️ test mode открыт для всех на 30 дней. Для постоянной игры настройте правила Firestore (можно ограничить запись только вошедшим: <code>allow write: if request.auth != null;</code>).</div>
        </details>
      </div>
    </div>
    <div class="actions"><button class="btn ghost" id="cancel">Отмена</button>
    <button class="btn primary" id="save">Сохранить и применить</button></div>`;
  overlay.classList.add('show');
  modal.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    modal.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    modal.querySelectorAll('.pane').forEach(p=>p.style.display=p.dataset.p===t.dataset.t?'':'none');
  });
  modal.querySelector('#cancel').onclick = closeModal;
  // export/import
  modal.querySelector('#exp').onclick = async ()=>{
    const data = await dataLayer.exportAll();
    const blob = new Blob([JSON.stringify({room:state.room,posts:data},null,2)],{type:'application/json'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download = 'игра-'+state.room+'.json'; a.click();
  };
  modal.querySelector('#imp').onclick = ()=> modal.querySelector('#impFile').click();
  modal.querySelector('#impFile').onchange = (e)=>{
    const f = e.target.files[0]; if(!f) return;
    const rd = new FileReader();
    rd.onload = async ()=>{ try{
      const parsed = JSON.parse(rd.result);
      const arr = Array.isArray(parsed) ? parsed : parsed.posts;
      if(!Array.isArray(arr)) throw new Error('Нет массива posts');
      if(confirm('Импортировать '+arr.length+' записей в комнату?')){ await dataLayer.importAll(arr); alert('Импортировано.'); }
    }catch(err){ alert('Ошибка импорта: '+err.message); } };
    rd.readAsText(f);
  };
  modal.querySelector('#save').onclick = ()=>{
    const name = modal.querySelector('#sName').value.trim();
    const room = modal.querySelector('#sRoom').value.trim() || 'общая-комната';
    const fb = modal.querySelector('#sFb').value.trim();
    if(name){ state.me=name; localStorage.setItem(LS.me,name); }
    let needReload = (room!==state.room) || (fb!==(localStorage.getItem(LS.fb)||''));
    state.room = room; localStorage.setItem(LS.room, room);
    if(fb){ try{ JSON.parse(fb); localStorage.setItem(LS.fb, fb); }
      catch(e){ alert('Конфиг должен быть корректным JSON: '+e.message); return; } }
    else { localStorage.removeItem(LS.fb); }
    closeModal();
    if(needReload){ location.reload(); } else { renderChrome(); }
  };
}

/* ---------- утилиты ---------- */
function ownerFields(){
  return state.user ? {authorUid:state.user.uid, authorEmail:state.user.email} : {};
}

// загрузка файла: сохраняем для скачивания + по возможности извлекаем читаемый текст
let _mammoth = null;
async function loadMammoth(){
  if(_mammoth!==null) return _mammoth;
  try{
    await new Promise((res,rej)=>{ const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
      s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    _mammoth = window.mammoth || false;
  }catch(e){ _mammoth = false; }
  return _mammoth;
}
async function readUpload(input){
  const f = input && input.files && input.files[0];
  if(!f) return null;
  const ext = (f.name.split('.').pop()||'').toLowerCase();
  const dataUrl = await new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(f); });
  let text='';
  try{
    if(ext==='txt'){ text = (await f.text()).trim(); }
    else if(ext==='docx'){
      const mm = await loadMammoth();
      if(mm){ const ab = await f.arrayBuffer(); const r = await mm.extractRawText({arrayBuffer:ab}); text=(r.value||'').trim(); }
    }
  }catch(e){ console.warn('Не удалось извлечь текст:', e); }
  return {fileName:f.name, fileType:ext, fileData:dataUrl, text};
}
function el(tag,cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }
function elText(cls,txt){ const e=el('div',cls); e.textContent=txt; return e; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function openAuthModal(){
  const u = state.user;
  modal.innerHTML = `<h2>👤 Аккаунт</h2>
    <div class="content">
      ${u ? `<div class="hint">Вы вошли как <b>${esc(u.displayName||'')}</b><br>${esc(u.email||'')}</div>`
          : `<div class="hint">Войдите через Google — ваше имя будет автором текстов, а записи сохранятся в облаке.</div>`}
      <div class="field" style="margin-top:14px">
        ${u ? `<button class="btn" id="out" style="width:100%">Выйти</button>`
            : `<button class="btn primary" id="in" style="width:100%">Войти через Google</button>`}
      </div>
      <div class="hint">⚠️ Вход Google работает только при открытии страницы по http(s) (хостинг или локальный сервер), не из файла <code>file://</code>.</div>
    </div>
    <div class="actions"><button class="btn ghost" id="cancel">Закрыть</button></div>`;
  overlay.classList.add('show');
  modal.querySelector('#cancel').onclick = closeModal;
  if(u){ modal.querySelector('#out').onclick = async ()=>{ await dataLayer.auth.signOut(); state.me=''; closeModal(); }; }
  else { modal.querySelector('#in').onclick = async ()=>{ closeModal(); await dataLayer.auth.signIn(); }; }
}

function openIdentityUI(){
  if(state.mode === 'cloud' && dataLayer && dataLayer.auth){ openAuthModal(); }
  else { openMeModal(); }
}

/* ---------- тема ---------- */
function applyTheme(t){
  document.body.classList.toggle('light', t==='light');
  localStorage.setItem(LS.theme, t);
}
function toggleTheme(){
  applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
}
applyTheme(localStorage.getItem(LS.theme) || 'dark');

/* ---------- кнопки ---------- */
document.getElementById('newRootBtn').onclick = openRootModal;
document.getElementById('settingsBtn').onclick = openSettings;
document.getElementById('themeBtn').onclick = toggleTheme;
document.getElementById('mePill').onclick = openIdentityUI;

/* ---------- старт ---------- */

// Спросим только когда участник впервые делает ход (requireIdentity).
initLayer();
